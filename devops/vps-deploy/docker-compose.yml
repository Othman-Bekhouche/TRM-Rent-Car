version: '3.8'

services:
  studio:
    container_name: supabase-studio
    image: supabase/studio:2026.02.16-sha-26c615c
    restart: always
    environment:
      SUPABASE_URL: http://kong:8000
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${ORGANIZATION_NAME}
      DEFAULT_PROJECT_NAME: ${PROJECT_NAME}
      # Required for Supabase AI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - supabase-network

  kong:
    container_name: supabase-kong
    image: kong:2.8.1
    restart: always
    volumes:
      - ./volumes/api/kong.yml:/var/lib/kong/kong.yml
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,AAAA
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,jwt
    ports:
      - "8000:8000"
      - "8444:8443"
    networks:
      - supabase-network

  auth:
    container_name: supabase-auth
    image: supabase/gotrue:v2.151.0
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      timeout: 5s
      interval: 5s
      retries: 3
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres?sslmode=disable
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_ADMIN_GROUP_NAME: supabase_admin
      GOTRUE_DB_MAX_POOL_SIZE: 30
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      # SMTP Settings
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
    networks:
      - supabase-network

  rest:
    container_name: supabase-rest
    image: postgrest/postgrest:v12.2.0
    restart: always
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_STATS: "false"
      PGRST_DB_EXTRA_SEARCH_PATH: public,extensions
    networks:
      - supabase-network

  realtime:
    container_name: supabase-realtime
    image: supabase/realtime:v2.76.5
    restart: always
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${JWT_SECRET}
      REPLICATION_MODE: RLS
      REPLICATION_SLOT_NAME: supabase_realtime_rc
      SECURE_CHANNELS_ONLY: "true"
    networks:
      - supabase-network

  storage:
    container_name: supabase-storage
    image: supabase/storage-api:v1.37.8
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://storage:5000/status"]
      timeout: 5s
      interval: 5s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: default
      REGION: ${S3_REGION}
      GLOBAL_S3_BUCKET: ${S3_BUCKET}
    volumes:
      - ./volumes/storage:/var/lib/storage:z
    networks:
      - supabase-network

  meta:
    container_name: supabase-meta
    image: supabase/postgres-meta:v0.84.2
    restart: always
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - supabase-network

  db:
    container_name: supabase-db
    image: supabase/postgres:15.1.1.78
    restart: always
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_HOST: /var/run/postgresql
      # Roles and JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 3600
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data:z
    networks:
      - supabase-network

networks:
  supabase-network:
    driver: bridge
